apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "joplin-server.fullname" . }}
  labels:
    {{- include "joplin-server.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "joplin-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "joplin-server.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "joplin-server.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: APP_BASE_URL
              value: {{ .Values.joplin.appBaseUrl | quote }}
            - name: APP_PORT
              value: {{ .Values.joplin.appPort | quote }}
            - name: STORAGE_DRIVER
              value: {{ .Values.joplin.storage.driver | quote }}
            {{- if .Values.joplin.storage.driverFallback }}
            - name: STORAGE_DRIVER_FALLBACK
              value: {{ .Values.joplin.storage.driverFallback | quote }}
            {{- end }}
            {{- if .Values.joplin.mailer.enabled }}
            - name: MAILER_ENABLED
              value: "1"
            - name: MAILER_HOST
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.joplin.mailer.existingSecretName }}
                  key: mailerHost
            - name: MAILER_PORT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.joplin.mailer.existingSecretName }}
                  key: mailerPort
            - name: MAILER_SECURE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.joplin.mailer.existingSecretName }}
                  key: mailerSecure
            - name: MAILER_AUTH_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.joplin.mailer.existingSecretName }}
                  key: mailerAuthUser
            - name: MAILER_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.joplin.mailer.existingSecretName }}
                  key: mailerAuthPassword
            - name: MAILER_NOREPLY_NAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.joplin.mailer.existingSecretName }}
                  key: mailerNoreplyName
            - name: MAILER_NOREPLY_EMAIL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.joplin.mailer.existingSecretName }}
                  key: mailerNoreplyEmail
            {{- end }}
            {{- if eq .Values.joplin.database.client "pg" }}
            - name: DB_CLIENT
              value: "pg"
            {{- if .Values.joplin.postgres.existingSecret }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.joplin.postgres.existingSecret }}
                  key: {{ .Values.joplin.postgres.existingSecretPasswordKey }}
            {{- else }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.joplin.postgres.password | quote }}
            {{- end }}
            {{- if .Values.joplin.postgres.sslModeNoVerify }}
            - name: POSTGRES_CONNECTION_STRING
              value: "postgresql://{{ .Values.joplin.postgres.user }}:$(POSTGRES_PASSWORD)@{{ .Values.joplin.postgres.host }}:{{ .Values.joplin.postgres.port }}/{{ .Values.joplin.postgres.database }}?sslmode=no-verify"
            {{- else }}
            - name: POSTGRES_HOST
              value: {{ .Values.joplin.postgres.host | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.joplin.postgres.port | quote }}
            - name: POSTGRES_DATABASE
              value: {{ .Values.joplin.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.joplin.postgres.user | quote }}
            {{- end }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.joplin.appPort }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/ping
              port: http
              httpHeaders:
                - name: Host
                  value: {{ .Values.joplin.appBaseUrl | trimPrefix "https://" | trimPrefix "http://" | trimSuffix "/" }}
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/ping
              port: http
              httpHeaders:
                - name: Host
                  value: {{ .Values.joplin.appBaseUrl | trimPrefix "https://" | trimPrefix "http://" | trimSuffix "/" }}
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          {{- if .Values.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "joplin-server.pvcName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
