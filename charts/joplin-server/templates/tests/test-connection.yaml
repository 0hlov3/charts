apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "joplin-server.fullname" . }}-test-connection"
  labels:
    {{- include "joplin-server.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ['wget']
      args:
        - '--spider'
        - '--timeout=10'
        - 'http://{{ include "joplin-server.fullname" . }}:{{ .Values.service.port }}/api/ping'
  restartPolicy: Never
